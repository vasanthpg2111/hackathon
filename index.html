<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Car & Bike Rental</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
  <button onclick="showSection('login-section')">Login</button>
  <button onclick="showSection('rental-choice-section')">Rent a Vehicle</button>
  <button onclick="showSection('owner-form-section')">List Your Vehicle</button>
</nav>

<!-- LOGIN SECTION -->
<section id="login-section" class="visible">
  <h2>Login / Signup</h2>
  <input type="text" placeholder="Username" />
  <input type="password" placeholder="Password" />
  <button>Login</button>
</section>

<!-- RENTAL CHOICE -->
<section id="rental-choice-section">
  <h2>Rent a Vehicle</h2>
  <select onchange="showSection('rental-type-section')">
    <option value="">Select Vehicle</option>
    <option value="car">Car</option>
    <option value="bike">Bike</option>
  </select>
</section>

<!-- RENTAL TYPE -->
<section id="rental-type-section">
  <h2>Rental Type</h2>
  <select onchange="handleRentalType(this.value)">
    <option value="">Select Rental Type</option>
    <option value="self">Self Drive</option>
    <option value="driver">With Driver</option>
  </select>
</section>

<!-- DRIVER SELECTION -->
<section id="driver-select-section">
  <h2>Select a Driver</h2>
  <div class="card">
    <p><strong>Name:</strong> John Doe</p>
    <p><strong>Experience:</strong> 5 years</p>
    <p><strong>Phone:</strong> +91 9876543210</p>
    <button onclick="showSection('payment-section')">Select Driver</button>
  </div>
</section>

<!-- PAYMENT SECTION -->
<section id="payment-section">
  <h2>Upload Documents</h2>
  <label>Aadhar Card</label>
  <input type="file" />
  <label>Driving License</label>
  <input type="file" />
  <button onclick="showSection('confirmation-section')">Proceed to Confirmation</button>
</section>

<!-- BOOKING CONFIRMATION -->
<section id="confirmation-section">
  <h2>Booking Confirmed!</h2>
  <p>Your booking ID is: <strong>RNT123456</strong></p>
  <h3>Pickup Location:</h3>
  <iframe src="https://www.google.com/maps?q=Chennai+Central+Railway+Station&output=embed" width="100%" height="300"></iframe>
</section>

<!-- OWNER FORM -->
<section id="owner-form-section">
  <h2>List Your Vehicle</h2>
  <select>
    <option value="car">Car</option>
    <option value="bike">Bike</option>
  </select>
  <input type="text" placeholder="Brand & Model" />
  <textarea placeholder="Vehicle Description"></textarea>
  <label>Legal Status</label>
  <select>
    <option>No fines or cases</option>
    <option>Minor fine (₹500-₹1000)</option>
    <option>Under review (contact admin)</option>
  </select>
  <label>Upload Vehicle Photos</label>
  <input type="file" multiple />
  <label>Enter Google Maps Location Link</label>
  <input type="text" placeholder="https://maps.google.com/..." />
  <button onclick="alert('Vehicle Submitted!')">Submit Vehicle</button>
</section>

<script src="script.js"></script>
</body>
</html>
