!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Car & Bike Rental</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #121212;
      color: #ffffff;
      scroll-behavior: smooth;
    }

    section {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      padding: 20px;
      animation: fadeIn 0.8s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h2 {
      color: #00d4ff;
      margin-bottom: 20px;
    }

    input, select, button {
      padding: 12px;
      margin: 10px;
      width: 80%;
      max-width: 400px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
      background-color: #333;
      color: white;
    }

    button {
      background-color: #00d4ff;
      color: black;
      font-weight: bold;
      transition: background 0.3s, transform 0.3s;
      cursor: pointer;
    }

    button:hover {
      background-color: #00aacc;
      transform: scale(1.05);
      border-radius: 16px;
    }

    #map {
      height: 300px;
      width: 90%;
      max-width: 500px;
      margin-bottom: 20px;
      border-radius: 10px;
    }

    .driver-buttons {
      display: flex;
      flex-direction: column;
      width: 80%;
      max-width: 400px;
    }

    .driver-btn {
      margin: 10px 0;
      padding: 12px;
      border-radius: 10px;
      background-color: #333;
      color: white;
      border: none;
      font-size: 1rem;
      transition: background 0.3s, border-radius 0.3s;
      cursor: pointer;
    }

    .driver-btn:hover {
      background-color: #00aacc;
      border-radius: 16px;
    }

    .driver-btn.selected {
      background-color: #00d4ff;
      color: black;
      border-radius: 16px;
    }
  </style>
</head>
<body>

  <!-- Login Section -->
  <section id="loginSection">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username">
    <input type="password" id="password" placeholder="Password">
    <button onclick="nextSection('rentTypeSection')">Login</button>
  </section>

  <!-- Rent or List Section -->
  <section id="rentTypeSection">
    <h2>Choose Your Option</h2>
    <button onclick="nextSection('takeRentSection')">Take a Rent</button>
    <button onclick="nextSection('listVehicleSection')">List My Vehicle</button>
  </section>

  <!-- Take Rent Section -->
  <section id="takeRentSection">
    <h2>Rent Vehicle Type</h2>
    <button onclick="nextSection('rentModeSection')">Car</button>
    <button onclick="nextSection('rentModeSection')">Bike</button>
  </section>

  <!-- Rent Mode -->
  <section id="rentModeSection">
    <h2>Rental Mode</h2>
    <button onclick="nextSection('driverSelection')">With Driver</button>
    <button onclick="nextSection('pickupLocation')">Self Drive</button>
  </section>

  <!-- Driver Selection -->
  <section id="driverSelection">
    <h2>Select Driver</h2>
    <div class="driver-buttons">
      <button class="driver-btn" onclick="selectDriver(this)">Driver A - 5 yrs exp - ★★★★☆</button>
      <button class="driver-btn" onclick="selectDriver(this)">Driver B - 3 yrs exp - ★★★☆☆</button>
      <button class="driver-btn" onclick="selectDriver(this)">Driver C - 8 yrs exp - ★★★★★</button>
    </div>
    <button onclick="nextSection('pickupLocation')">Confirm Driver</button>
  </section>

  <!-- Pickup Location -->
  <section id="pickupLocation">
    <h2>Select Pickup Location</h2>
    <div id="map"></div>
    <button onclick="nextSection('proofSection')">Confirm Pickup Point</button>
  </section>

  <!-- Upload Proof -->
  <section id="proofSection">
    <h2>Upload Proof & Payment</h2>
    <input type="file" accept="image/*,.pdf" multiple>
    <select>
      <option>Pay via UPI</option>
      <option>Credit/Debit Card</option>
      <option>Cash on Delivery</option>
    </select>
    <button onclick="nextSection('finalSection')">Submit & Proceed</button>
  </section>

  <!-- Confirmation -->
  <section id="finalSection">
    <h2>Booking Confirmed!</h2>
    <p>Thank you for using our service.</p>
  </section>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
